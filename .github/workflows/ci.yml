name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prometeo-tattoo/backend
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/prometeo_test
      DIRECT_URL: postgresql://user:password@localhost:5432/prometeo_test
      JWT_SECRET: ci-test-secret-not-real
      MERCADOPAGO_ACCESS_TOKEN: TEST-dummy-not-real
      MERCADOPAGO_WEBHOOK_SECRET: ci-webhook-secret
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:4000
      ALLOWED_ORIGINS: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prometeo-tattoo/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prometeo-tattoo/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prometeo-tattoo/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
